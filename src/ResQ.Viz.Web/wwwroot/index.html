<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResQ Viz</title>
    <link rel="stylesheet" href="/css/viz.css">
</head>
<body>
    <div id="scene-container"></div>
    <div id="controls">
        <h2>ResQ Viz</h2>
        <!-- Control panel added in Task 9 -->
        <p id="connection-status">Connecting...</p>
    </div>
    <div id="stats">
        <span id="fps">FPS: --</span> |
        <span id="drone-count">Drones: 0</span> |
        <span id="sim-time">T: 0.0s</span>
    </div>

    <!-- Three.js via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Three.js OrbitControls (needs to be loaded from unpkg for r128) -->
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <!-- SignalR JS client -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>

    <script type="module" src="/js/app.js"></script>
</body>
</html>
