# Weekly dependency updates, grouped to keep PR noise low.

version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:17"
    groups:
      github-actions:
        patterns: ["*"]
    labels: [chore, deps]
    open-pull-requests-limit: 5
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:17"
    groups:
      nuget:
        patterns: ["*"]
    labels: [chore, deps]
    open-pull-requests-limit: 5
