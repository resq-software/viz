#
# Thin caller for the org-wide reusable security-scan workflow in
# resq-software/.github.

name: security

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: '17 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  scan:
    uses: resq-software/.github/.github/workflows/security-scan.yml@23ce94eabddf963835624451e89baca7ac9db541  # main
    with:
      languages: '["csharp","actions"]'
      submodules: recursive
    secrets: inherit
